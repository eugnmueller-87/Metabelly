name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-asyncio pytest-cov
          pip install -e .

      # Gate 1 — formatting
      - name: Check formatting (ruff)
        run: ruff format --check .

      # Gate 2 — linting
      - name: Lint (ruff)
        run: ruff check .

      # Gate 3 — type safety
      - name: Type check (mypy)
        run: mypy metabelly/

      # Gate 4 — tests + coverage minimum 50%
      - name: Tests + coverage
        run: pytest
        env:
          MISTRAL_API_KEY: test-key-ci-only

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff
          pip install -e .

      # Gate 5 — no secrets, no known vulnerabilities
      - name: Security scan (bandit)
        run: ruff check --select S --ignore S104,S105,S106 .

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
